<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSearch - Let's find your dream job</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=1.3">
    <style>
        /* Fallback quick simple styles in case css doesn't load */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f6fc;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="nav-container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="4" width="20" height="16" rx="2" fill="#fff" />
                    <path d="M7 10h10M7 14h6" stroke="#004e8c" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span>JobSearch</span>
            </div>
            <nav class="top-nav">
                <a href="#" class="active">Find jobs</a>
                <a href="#">Company reviews</a>
                <a href="#">Find Salaries</a>
                <a href="#">Community</a>
            </nav>
            <div class="user-actions">
                <div class="bell-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                </div>
                <!-- Mock User Avatar -->
                <div class="user-avatar"
                    style="background:#ddd;width:32px;height:32px;border-radius:50%;display:inline-block;"></div>
            </div>
        </div>

        <div class="hero-section">
            <h1>Let's find your dream job</h1>
            <p>Discover the best remote and work from home jobs at top remote companies.</p>
        </div>

        <div class="search-container">
            <div class="search-box">
                <form action="#" method="GET" class="search-form">
                    <div class="input-group select-group">
                        <select name="job_type" class="search-select">
                            <option value="" disabled selected hidden>Select job type</option>
                            <option value="job">Job</option>
                            <option value="internship">Internship</option>
                        </select>
                        <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="#6b7280" stroke-width="2">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <div class="divider"></div>
                    <div class="input-group keyword-group">
                        <input type="text" name="q" placeholder="Enter keyword / designation / companies"
                            class="search-input">
                    </div>
                    <div class="divider"></div>
                    <div class="input-group location-group">
                        <input type="text" name="location" placeholder="Enter location" class="search-input">
                    </div>
                    <div class="search-actions">
                        <button type="submit" class="btn-search">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                            Search
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Please login to continue</h2>
            <form class="login-form">
                <div class="form-group">
                    <input type="email" placeholder="E-mail" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <div class="social-login">
                <div class="divider-text"><span>or login with</span></div>
                <div class="social-icons">
                    <a href="#" class="social-icon google">
                        <svg width="24" height="24" viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                    </a>
                    <a href="#" class="social-icon linkedin">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#0077B5">
                            <path
                                d="M19 0h-14a5 5 0 0 0-5 5v14a5 5 0 0 0 5 5h14a5 5 0 0 0 5-5v-14a5 5 0 0 0-5-5zM8 19h-3v-10h3v10zM6.5 7.73a1.75 1.75 0 1 1 1.75-1.75 1.75 1.75 0 0 1-1.75 1.75zM20 19h-3v-5.22c0-1.24-.02-2.84-1.73-2.84-1.73 0-2 1.35-2 2.75v5.31h-3v-10h2.88v1.37h.04c.4-.76 1.38-1.57 2.85-1.57 3.05 0 3.61 2.01 3.61 4.61v5.59z" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js?v=1.1"></script>
</body>

</html>
