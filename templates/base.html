<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobSearch - Let's find your dream job</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=1.1">
    <style>
        /* Fallback quick simple styles in case css doesn't load */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f6fc;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="nav-container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="4" width="20" height="16" rx="2" fill="#fff" />
                    <path d="M7 10h10M7 14h6" stroke="#004e8c" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span>JobSearch</span>
            </div>
            <nav class="top-nav">
                <a href="#" class="active">Find jobs</a>
                <a href="#">Company reviews</a>
                <a href="#">Find Salaries</a>
                <a href="#">Community</a>
            </nav>
            <div class="user-actions">
                <div class="bell-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                </div>
                <!-- Mock User Avatar -->
                <div class="user-avatar"
                    style="background:#ddd;width:32px;height:32px;border-radius:50%;display:inline-block;"></div>
            </div>
        </div>

        <div class="hero-section">
            <h1>Let's find your dream job</h1>
            <p>Discover the best remote and work from home jobs at top remote companies.</p>
        </div>

        <div class="search-container">
            <div class="search-box">
                <form action="#" method="GET" class="search-form">
                    <div class="input-group select-group">
                        <select name="job_type" class="search-select">
                            <option value="">Select job type</option>
                            <option value="full-time">Full Time</option>
                            <option value="part-time">Part Time</option>
                            <option value="contract">Contract</option>
                            <option value="internship">Internship</option>
                            <option value="freelance">Freelance</option>
                        </select>
                        <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="#6b7280" stroke-width="2">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <div class="divider"></div>
                    <div class="input-group keyword-group">
                        <input type="text" name="q" placeholder="Enter keyword / designation / companies"
                            class="search-input">
                    </div>
                    <div class="divider"></div>
                    <div class="input-group location-group">
                        <input type="text" name="location" placeholder="Enter location" class="search-input">
                    </div>
                    <div class="search-actions">
                        <button type="submit" class="btn-search">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                            Search
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/script.js"></script>
</body>

</html>
